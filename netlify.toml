[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Default timeout for all functions (Netlify free tier max = 10s)
  # upload and gemini-proxy get longer limits as they call external APIs
  node_bundler = "esbuild"

[functions."upload"]
  timeout = 30

[functions."gemini-proxy"]
  timeout = 30

[functions."send-sms"]
  timeout = 10

[functions."send-email"]
  timeout = 10

[functions."incoming-sms"]
  timeout = 10

# InstaQuote lead capture endpoint — does PDF gen + Storage upload + SendGrid
# inline in a single request, so it needs the longer timeout.
[functions."instaquote-lead"]
  timeout = 30

# SendGrid event webhook ingest — small inserts but a busy webhook may batch
# many events. 15s gives headroom without abusing the free tier.
[functions."sendgrid-events"]
  timeout = 15

# Test cohort harness — backdates 5 fake leads so the 52-day sequence runs in
# a compressed window. Quick.
[functions."instaquote-test-cohort"]
  timeout = 10

# Public-facing alias matching the contract in the Cowork brief.
[[redirects]]
  from = "/api/instaquote-lead"
  to   = "/.netlify/functions/instaquote-lead"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
